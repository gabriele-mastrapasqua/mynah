name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenBLAS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Build
        run: make
      - name: Smoke test CLI
        run: ./mynah --version && ./mynah
      - name: Unit/golden tests (skippano senza modello)
        run: make test

  sanitizers:
    # ASan solo su Linux: su macOS e' lentissimo (localmente: make leaks + make ubsan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: Build ASan/UBSan
        run: make asan
      - name: Smoke test
        run: ./mynah --version
