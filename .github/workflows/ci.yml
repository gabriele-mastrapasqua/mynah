# Mynah CI: build matrix + FUNCTIONAL tests with a real model (lesson from
# qwen-tts: build-only CI protects nothing). The test model is
# parakeet-tdt_ctc-110m (114M, CC-BY-4.0, RTF ~0.03): converted artifacts are
# cached (actions/cache, key on converter+oracle hash) and HF is only contacted
# on a cache miss — the prepare-model job warms the cache ONCE, so the 3-OS
# matrix never races to download. Nemotron/v3 and the big models remain
# local-only tests (exit 77 = SKIP). Download/convert logic lives in
# .github/actions/prepare-model (shared with safety.yml).
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  MODEL: parakeet-tdt_ctc-110m
  MODEL_URL: https://huggingface.co/nvidia/parakeet-tdt_ctc-110m/resolve/main/parakeet-tdt_ctc-110m.nemo

jobs:
  prepare-model:
    name: Prepare model (warm shared cache)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/prepare-model
        with:
          model: ${{ env.MODEL }}
          model-url: ${{ env.MODEL_URL }}

  build-test:
    name: Build & Test
    needs: prepare-model
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest        # x86_64: also validates the AVX2/VNNI kernels
          - os: ubuntu-24.04-arm     # aarch64: NEON/SDOT
          - os: macos-latest         # arm64: Accelerate + Metal
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Build
        run: make

      - name: Kernel self-test (no model needed)
        run: make tests/test_qmat && tests/test_qmat

      - name: Kernel self-test — explicit SIMD levels (x86)
        if: matrix.os == 'ubuntu-latest'
        run: |
          MYNAH_CAPS=scalar tests/test_qmat
          MYNAH_CAPS=avx2   tests/test_qmat   # downgrades with a note if unsupported

      - name: Restore converted model (cache warmed by prepare-model)
        uses: ./.github/actions/prepare-model
        with:
          model: ${{ env.MODEL }}
          model-url: ${{ env.MODEL_URL }}

      - name: Setup uv                # needed by test-samples (Python eval)
        uses: astral-sh/setup-uv@v5

      - name: Int8 checkpoint (exercises the quantize path)
        run: ./mynah quantize -m models/${{ env.MODEL }} --quant int8

      - name: Tests (parity vs oracle + e2e; big models skip)
        run: make test

      - name: Quality on real audio (samples/ FLEURS, CER with the 110m)
        run: make test-samples

  # Compile-only CUDA build: no GPU on the runner, but it catches build/link
  # regressions in the nvcc path (e.g. the MYNAH_BUILD quoting bug found on the
  # first real A100 build, 2026-07-20). The runtime falls back to CPU without a
  # device, so the kernel self-test still runs.
  build-cuda:
    name: Build CUDA (compile-only)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev nvidia-cuda-toolkit
      - name: Build (make cuda)
        run: make cuda
      - name: Smoke test (CPU fallback, no GPU)
        run: |
          ./mynah --version
          make tests/test_qmat && tests/test_qmat
