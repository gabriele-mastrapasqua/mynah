# Memory safety: ASan+UBSan build AND full test execution with a real model
# (without a model the tests exit 77/skip and the sanitizers would cover almost
# nothing). The model comes from the same cross-workflow cache as ci.yml via
# .github/actions/prepare-model — HF is only contacted on a cache miss.
# Linux only: ASan on macOS is extremely slow (locally: make leaks + make ubsan).
name: Memory Safety

on:
  push:
    branches: [main]
  pull_request:

env:
  MODEL: parakeet-tdt_ctc-110m
  MODEL_URL: https://huggingface.co/nvidia/parakeet-tdt_ctc-110m/resolve/main/parakeet-tdt_ctc-110m.nemo

jobs:
  asan:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - uses: ./.github/actions/prepare-model
        with:
          model: ${{ env.MODEL }}
          model-url: ${{ env.MODEL_URL }}

      - name: ASan+UBSan (build AND test execution)
        run: make asan
