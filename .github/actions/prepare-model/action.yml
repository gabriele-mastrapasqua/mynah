# Shared step: converted CI model + golden dumps, cached across ALL workflows
# (same key in ci.yml and safety.yml -> one cache entry per converter/oracle
# change). HF is only contacted on a cache miss; the converted artifacts are
# platform-independent, so a cache written on ubuntu is reused on macos/arm.
name: Prepare CI model
description: Restore (or download+convert) the converted test model and golden dumps

inputs:
  model:
    description: Model name (models/<model>/)
    required: true
  model-url:
    description: URL of the .nemo archive
    required: true

runs:
  using: composite
  steps:
    - name: Cache converted model + goldens
      id: model-cache
      uses: actions/cache@v4
      with:
        path: |
          models/${{ inputs.model }}
          tests/golden/parakeet110_en
        key: ${{ inputs.model }}-v1-${{ hashFiles('tools/convert_nemo.py', 'tools/oracle/**') }}

    - name: Setup uv
      if: steps.model-cache.outputs.cache-hit != 'true'
      uses: astral-sh/setup-uv@v5

    - name: Download and convert the model (.nemo -> mynah), golden dump
      if: steps.model-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p models/${{ inputs.model }}
        curl -fL --retry 3 -o models/${{ inputs.model }}/${{ inputs.model }}.nemo "${{ inputs.model-url }}"
        cd tools && uv sync --extra oracle
        uv run python convert_nemo.py ../models/${{ inputs.model }}
        uv run python -m oracle.transcribe ../models/${{ inputs.model }} \
          ../tests/audio/test_en.wav --dump-dir ../tests/golden/parakeet110_en
        cd .. && rm models/${{ inputs.model }}/${{ inputs.model }}.nemo   # the cache keeps only the converted model
